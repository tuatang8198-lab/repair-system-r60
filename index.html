<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ระบบแจ้งซ่อมคอมพิวเตอร์ · รร.ราชประชานุเคราะห์ 60</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #0b0d1a;
    --bg-soft: #11142a;
    --surface: rgba(255,255,255,0.06);
    --surface-strong: rgba(255,255,255,0.10);
    --border: rgba(255,255,255,0.10);
    --border-strong: rgba(255,255,255,0.18);
    --text: #ECEDF7;
    --text-dim: #9aa0c5;
    --text-mute: #6a708f;

    --primary: #5865ff;
    --primary-strong: #3949e0;
    --primary-soft: rgba(88,101,255,0.14);
    --accent: #ffb547;
    --accent-soft: rgba(255,181,71,0.15);

    --success: #4ade80;
    --success-soft: rgba(74,222,128,0.14);
    --warn: #facc15;
    --warn-soft: rgba(250,204,21,0.14);
    --danger: #ff6b8a;
    --danger-soft: rgba(255,107,138,0.14);
    --info: #67e8f9;
    --info-soft: rgba(103,232,249,0.14);

    --r-sm: 8px;
    --r-md: 14px;
    --r-lg: 22px;
    --r-xl: 28px;

    --shadow-lg: 0 30px 80px -30px rgba(8,10,30,.7), 0 8px 30px -10px rgba(8,10,30,.5);

    --mono: "JetBrains Mono", ui-monospace, monospace;
    --sans: "IBM Plex Sans Thai", "IBM Plex Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    color: var(--text);
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv01";
    letter-spacing: 0.01em;
  }

  /* Animated mesh gradient */
  .bg-mesh {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(60% 50% at 18% 18%, rgba(88,101,255,0.35), transparent 70%),
      radial-gradient(50% 50% at 85% 12%, rgba(255,181,71,0.22), transparent 70%),
      radial-gradient(60% 55% at 75% 90%, rgba(70,200,255,0.20), transparent 70%),
      radial-gradient(50% 60% at 20% 95%, rgba(180,90,255,0.18), transparent 70%),
      var(--bg);
    filter: saturate(115%);
    animation: meshDrift 22s ease-in-out infinite alternate;
  }
  .bg-mesh::after{
    content:""; position: absolute; inset:0;
    background-image:
      radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    pointer-events:none;
  }
  @keyframes meshDrift {
    0%   { transform: translate3d(0,0,0) scale(1); }
    50%  { transform: translate3d(-1.5%, 1%, 0) scale(1.04); }
    100% { transform: translate3d(1%, -1%, 0) scale(1.02); }
  }

  #root { position: relative; z-index: 1; min-height: 100vh; }

  button, input, textarea, select { font: inherit; color: inherit; }
  button { cursor: pointer; border: none; background: none; }
  input, textarea, select { outline: none; }

  /* ---------- shared components ---------- */
  .glass {
    background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03));
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    box-shadow: var(--shadow-lg);
  }

  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    height: 26px; padding: 0 10px;
    border-radius: 99px;
    font-size: 12px; font-weight: 500;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .chip .dot {
    width: 6px; height: 6px; border-radius: 99px; background: currentColor;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.04);
  }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    height: 44px; padding: 0 18px;
    border-radius: 12px;
    font-weight: 500;
    border: 1px solid transparent;
    transition: transform .15s ease, background .2s ease, box-shadow .2s ease, border-color .2s;
    white-space: nowrap;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: linear-gradient(180deg, var(--primary), var(--primary-strong));
    color: white;
    box-shadow: 0 10px 30px -10px rgba(88,101,255,0.6), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .btn-primary:hover { box-shadow: 0 14px 40px -10px rgba(88,101,255,0.85), inset 0 1px 0 rgba(255,255,255,0.3); }
  .btn-ghost {
    background: var(--surface); border-color: var(--border); color: var(--text);
  }
  .btn-ghost:hover { background: var(--surface-strong); border-color: var(--border-strong); }
  .btn-danger {
    background: linear-gradient(180deg, #ff6b8a, #d94d6c);
    color: white;
    box-shadow: 0 10px 30px -10px rgba(255,107,138,.55);
  }
  .btn-accent {
    background: linear-gradient(180deg, #ffd17a, #ffb547);
    color: #2a1d00;
    box-shadow: 0 10px 30px -10px rgba(255,181,71,0.6);
  }
  .btn-sm { height: 34px; padding: 0 12px; font-size: 13px; border-radius: 10px; }

  .field {
    display:flex; flex-direction:column; gap: 6px;
  }
  .field label {
    font-size: 12px; color: var(--text-dim);
    font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .input, .textarea, .select {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 12px;
    padding: 12px 14px;
    transition: border-color .15s, background .15s, box-shadow .15s;
  }
  .input:focus, .textarea:focus, .select:focus {
    border-color: rgba(88,101,255,0.6);
    background: rgba(88,101,255,0.06);
    box-shadow: 0 0 0 4px rgba(88,101,255,0.15);
  }
  .textarea { resize: vertical; min-height: 110px; line-height: 1.55; }

  .mono { font-family: var(--mono); letter-spacing: 0.02em; }

  /* Status pills */
  .status {
    display: inline-flex; align-items: center; gap: 8px;
    height: 28px; padding: 0 12px; border-radius: 99px;
    font-size: 12px; font-weight: 600;
    border: 1px solid var(--border);
  }
  .status .pulse {
    width: 8px; height: 8px; border-radius: 99px; background: currentColor;
    box-shadow: 0 0 0 0 currentColor;
    animation: pulse 1.8s ease-out infinite;
  }
  .status.s-new      { color: var(--info);    background: var(--info-soft); }
  .status.s-prog     { color: var(--warn);    background: var(--warn-soft); }
  .status.s-wait     { color: var(--accent);  background: var(--accent-soft); }
  .status.s-done     { color: var(--success); background: var(--success-soft); }
  .status.s-cancel   { color: var(--danger);  background: var(--danger-soft); }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
    70%  { box-shadow: 0 0 0 8px transparent; opacity: 0.7; }
    100% { box-shadow: 0 0 0 0 transparent;  opacity: 1; }
  }

  /* Page transition */
  .page-enter { animation: pageIn .45s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes pageIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .stagger > * { animation: pageIn .55s cubic-bezier(.2,.7,.2,1) both; }
  .stagger > *:nth-child(1){ animation-delay: .04s; }
  .stagger > *:nth-child(2){ animation-delay: .10s; }
  .stagger > *:nth-child(3){ animation-delay: .16s; }
  .stagger > *:nth-child(4){ animation-delay: .22s; }
  .stagger > *:nth-child(5){ animation-delay: .28s; }
  .stagger > *:nth-child(6){ animation-delay: .34s; }
  .stagger > *:nth-child(7){ animation-delay: .40s; }
  .stagger > *:nth-child(8){ animation-delay: .46s; }

  /* Top bar */
  .topbar {
    position: sticky; top: 0; z-index: 30;
    background: linear-gradient(180deg, rgba(11,13,26,0.85), rgba(11,13,26,0.55));
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }

  .brand {
    display: flex; align-items: center; gap: 12px;
  }
  .brand-mark {
    width: 38px; height: 38px;
    border-radius: 11px;
    background: conic-gradient(from 200deg, #5865ff, #ffb547, #67e8f9, #5865ff);
    position: relative;
    box-shadow: 0 10px 30px -10px rgba(88,101,255,0.6);
  }
  .brand-mark::after{
    content:""; position:absolute; inset:3px; border-radius: 9px;
    background: var(--bg);
    display:flex; align-items:center; justify-content:center;
  }
  .brand-mark::before{
    content:"R60"; position:absolute; inset:0; z-index:2;
    display:flex; align-items:center; justify-content:center;
    font-family: var(--mono); font-weight: 700; font-size: 11px;
    color: var(--text);
  }
  .brand-title { font-weight: 600; font-size: 14px; line-height: 1.1; }
  .brand-sub   { font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }

  /* Reveal */
  .reveal { transition: transform .25s ease, box-shadow .25s ease, background .25s ease; }
  .reveal:hover { transform: translateY(-3px); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }

  /* Toast */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    z-index: 100;
    background: rgba(20, 24, 50, 0.95);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 12px 18px;
    border-radius: 14px;
    box-shadow: var(--shadow-lg);
    display: flex; align-items: center; gap: 10px;
    animation: toastIn .35s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translate(-50%, 14px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }

  /* Confetti container */
  .confetti { position: fixed; inset: 0; pointer-events: none; z-index: 90; }

  /* Helper */
  .row { display: flex; gap: 12px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 12px; }
  .grow { flex: 1; }
  .hide-sm { }

  @media (max-width: 760px){
    .hide-sm { display: none; }
  }
</style>
